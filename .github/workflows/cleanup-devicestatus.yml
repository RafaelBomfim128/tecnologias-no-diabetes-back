name: Cleanup devicestatus (keep last 3)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MongoDB driver
        run: npm install mongodb@6 --no-save

      - name: Cleanup collection
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          node <<'NODE'
          const { MongoClient } = require('mongodb');

          (async () => {
            const client = new MongoClient(process.env.MONGODB_URI);
            await client.connect();

            const db = client.db();
            const coll = db.collection('devicestatus');

            const total = await coll.countDocuments();
            console.log('Total documents:', total);

            if (total <= 3) {
              console.log('Nothing to delete');
              process.exit(0);
            }

            const third = await coll.find({})
              .sort({ _id: -1 })
              .skip(2)
              .limit(1)
              .next();

            const res = await coll.deleteMany({
              _id: { $lt: third._id }
            });

            console.log('Deleted:', res.deletedCount);

            await client.close();
          })();
          NODE
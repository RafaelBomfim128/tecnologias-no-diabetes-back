name: Cleanup devicestatus (keep last 3)

on:
  schedule:
    # every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      - name: Checkout (not strictly needed but kept for consistency)
        uses: actions/checkout@v4

      - name: Setup Node.js (required for npx)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cleanup devicestatus using mongosh (npx)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          # use npx -y to run mongosh without global install
          npx -y mongosh "$MONGODB_URI" --quiet <<'MJS'
          (async function() {
            try {
              const coll = db.getCollection('devicestatus');

              const total = await coll.countDocuments();
              print('Total devicestatus documents:', total);

              if (total <= 3) {
                print('Nothing to delete (<= 3 docs). Exiting.');
                quit(0);
              }

              // get the 3 most recent by created_at (ISO string ordering)
              const keepDocs = await coll.find({}, { projection: { _id: 1 } })
                .sort({ created_at: -1 })
                .limit(3)
                .toArray();

              const keepIds = keepDocs.map(d => d._id);
              print('Keeping IDs (most recent 3):', keepIds.map(i => i.toString()).join(', '));

              // delete everything not in keepIds
              const res = await coll.deleteMany({ _id: { $nin: keepIds } });
              print('Deleted:', res.deletedCount);

              quit(0);
            } catch (err) {
              print('Error:', err);
              quit(1);
            }
          })();
          MJS
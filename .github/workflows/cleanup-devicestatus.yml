name: Cleanup devicestatus (keep last 3)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install mongodb driver
        run: |
          npm init -y
          npm install mongodb@6

      - name: Create cleanup script
        run: |
          cat > cleanup-devicestatus.js <<'JS'
          const { MongoClient } = require('mongodb');

          (async () => {

            const client = new MongoClient(process.env.MONGODB_URI);
            await client.connect();

            const db = client.db();
            const coll = db.collection('devicestatus');

            const keepDocs = await coll
              .find({}, { projection: { _id: 1 } })
              .sort({ created_at: -1 })
              .limit(3)
              .toArray();

            const keepIds = keepDocs.map(d => d._id);

            const result = await coll.deleteMany({
              _id: { $nin: keepIds }
            });

            console.log("Deleted:", result.deletedCount);

            await client.close();

          })();
          JS

      - name: Run cleanup script
        run: node cleanup-devicestatus.js
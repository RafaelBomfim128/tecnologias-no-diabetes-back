name: Cleanup devicestatus (keep last 3)

on:
  schedule:
    - cron: '0 */3 * * *'   # a cada 3 horas
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install mongosh
        run: |
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh

      - name: Cleanup devicestatus
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          mongosh "$MONGODB_URI" --quiet --eval '

          const coll = db.collection("devicestatus");

          const keep = coll
            .find({}, { _id: 1 })
            .sort({ created_at: -1 })
            .limit(3)
            .toArray()
            .map(d => d._id);

          const result = coll.deleteMany({
            _id: { $nin: keep }
          });

          print("Deleted:", result.deletedCount);

          '